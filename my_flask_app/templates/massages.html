<!DOCTYPE html>
<html>
<head>
    <title>Мессенджер</title>
    <style>
        #messages-container { border:1px solid #000; padding:10px; max-width:400px; height:300px; overflow-y:auto; }
        .my-msg { color: blue; }
        .other-msg { color: green; }
    </style>
    <script>
        async function updateMessages() {
            const response = await fetch('/get_messages');
            const messages = await response.json();
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            messages.forEach(msg => {
                const p = document.createElement('p');
                if(msg.from === "{{ user }}"){
                    p.className = 'my-msg';
                } else {
                    p.className = 'other-msg';
                }
                p.textContent = `${msg.from}: ${msg.text}`;
                container.appendChild(p);
            });
            container.scrollTop = container.scrollHeight;
        }

        setInterval(updateMessages, 1000);
        window.onload = updateMessages;
    </script>
</head>
<body>
    <h2>Привет, {{ user }}!</h2>
    <a href="/logout">Выйти</a>
    <hr>
    <h3>Чат</h3>
    <div id="messages-container"></div>
    <hr>
    <form method="post">
        <input type="text" name="reply" placeholder="Написать сообщение..." required>
        <input type="submit" value="Отправить">
    </form>
</body>
</html>
